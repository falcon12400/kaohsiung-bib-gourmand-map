<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄必比登推介美食地圖 2025 | Kaohsiung Bib Gourmand Map</title>
    <meta name="description" content="2025年高雄必比登推介餐廳互動式地圖，收錄24家米其林推薦物超所值美食。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
                        <path d="M20 8 C20 8 12 16 12 22 C12 26.4 15.6 30 20 30 C24.4 30 28 26.4 28 22 C28 16 20 8 20 8Z" fill="currentColor" opacity="0.3"/>
                        <text x="20" y="25" text-anchor="middle" font-size="14" fill="currentColor" font-weight="bold">必</text>
                    </svg>
                </div>
                <div class="header-titles">
                    <h1>高雄必比登推介美食地圖</h1>
                    <p class="subtitle">2025 Kaohsiung Bib Gourmand Guide · 24 間物超所值餐廳</p>
                </div>
            </div>
            <div class="header-right">
                <div class="filter-pills" id="filter-pills">
                    <button class="pill active" data-category="all">全部 <span class="pill-count">24</span></button>
                    <button class="pill" data-category="台菜合菜">台菜合菜</button>
                    <button class="pill" data-category="小吃">小吃</button>
                    <button class="pill" data-category="其他料理">其他料理</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app-main">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="搜尋餐廳名稱或地址..." />
                </div>
                <div class="results-info">
                    <span id="results-count">24</span> 間餐廳
                </div>
            </div>
            <div class="restaurant-list" id="restaurant-list">
                <!-- Cards will be injected here -->
            </div>
        </aside>

        <!-- Map -->
        <div id="map-container">
            <div id="map"></div>
            <div class="map-overlay-legend" id="map-legend">
                <div class="legend-title">圖例</div>
                <div class="legend-item"><span class="legend-dot" style="background: #E74C3C;"></span> 台菜合菜</div>
                <div class="legend-item"><span class="legend-dot" style="background: #F39C12;"></span> 小吃</div>
                <div class="legend-item"><span class="legend-dot" style="background: #2ECC71;"></span> 其他料理</div>
            </div>
        </div>
    </main>

    <!-- Detail Panel (overlay) -->
    <div class="detail-panel" id="detail-panel">
        <button class="detail-close" id="detail-close" aria-label="關閉">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="detail-content" id="detail-content">
            <!-- Detail info injected here -->
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
